  - 信息素仅作为情绪外显（不涉及性吸引）
  - 匹配制度引发的社会议题（自由意志vs命定）
  - 气味识别系统（能通过气味辨别对方类型）
- 哨兵向导（清水）：
  - 感官增强者（哨兵）与情绪调节者（向导）的搭档制度
  - 精神结合形成战斗/工作默契
  - 感官过载与精神疏导的互助关系
  - 精神动物/图景作为内心投射
- 主导/辅助型人格分化：
  - 社会角色倾向而非控制关系
  - 领导型与支持型性格的互补
  - 打破刻板印象的角色反转

- 梦境共享（能进入他人的梦境）
- 记忆读取/记忆封印
- 情绪可视化（情绪会以颜色/光晕显现）
- 谎言识别（能感知他人是否说谎）
- 意图感知（能感知他人的意图善恶）
- 痛觉/感受链接（与特定人共享感受）
- 精神世界外化（内心世界可被进入）
- 思维投影（能将想象投射成幻象）
### 【时间/空间类】
- 时间流速差异（不同区域时间流速不同）
- 空间折叠（存在次元口袋/空间裂隙）
- 过去的残影（能看到某地发生过的事）
- 平行世界通道（能接触到其他可能性）
- 时间定格能力（能暂停局部时间）
- 空间感知（能感知远处发生的事）
